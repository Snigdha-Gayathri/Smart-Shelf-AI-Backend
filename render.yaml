# ─────────────────────────────────────────────
#  Render Blueprint  —  Smart Shelf AI
#  Single web service: FastAPI backend serves
#  the React SPA from frontend/dist
# ─────────────────────────────────────────────

services:
  - type: web
    name: smartshelf-ai
    runtime: python
    region: oregon

    # ── Build — install backend deps + build frontend ──
    buildCommand: |
      set -e
      cd backend
      pip install --upgrade pip
      pip install -r requirements.txt
      cd ../frontend
      npm ci --no-audit --no-fund
      npm run build

    # ── Start — gunicorn + uvicorn workers ──
    startCommand: cd backend && python -m gunicorn app:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 180 --workers 1

    # ── Environment ──
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: NODE_VERSION
        value: "20"
      - key: SKIP_ML
        value: "1"
      - key: PYTHONUNBUFFERED
        value: "1"
      # Set these in the Render dashboard (secrets):
      # - MONGODB_URI
      # - JWT_SECRET
      # - OPENAI_API_KEY

    # ── Health check ──
    healthCheckPath: /health

    # ── Plan ──
    plan: free
